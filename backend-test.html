<!doctype html>
<html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Test backendu Harmonogram MOW</title><style>body{font-family:system-ui;margin:24px;line-height:1.45}input,button{font-size:18px;padding:12px;margin:8px 0;width:100%;box-sizing:border-box}pre{white-space:pre-wrap;background:#111;color:#eee;padding:16px;border-radius:12px}</style></head><body><h1>Test backendu</h1><p>Wklej adres Apps Script kończący się na <b>/exec</b> oraz token.</p><input id="url" placeholder="https://script.google.com/macros/s/.../exec"><input id="token" placeholder="VIEW_TOKEN albo ADMIN_TOKEN"><button id="go">Testuj</button><pre id="out">Czekam...</pre><script>document.getElementById('go').onclick=()=>{const out=document.getElementById('out');let u=document.getElementById('url').value.trim().replace(/\/dev(?:\?.*)?$/,'/exec');const t=document.getElementById('token').value.trim();const cb='testCb_'+Date.now();const url=new URL(u);url.searchParams.set('action','ping');url.searchParams.set('token',t);url.searchParams.set('callback',cb);url.searchParams.set('format','jsonp');url.searchParams.set('_',Date.now());out.textContent='Ładuję: '+url;const s=document.createElement('script');let done=false;window[cb]=(p)=>{done=true;out.textContent=JSON.stringify(p,null,2);delete window[cb];s.remove();};s.onerror=()=>{out.textContent='BŁĄD: nie udało się załadować Apps Script jako JSONP. Sprawdź dostęp wdrożenia: Każdy.';delete window[cb];s.remove();};s.onload=()=>setTimeout(()=>{if(!done){out.textContent='BŁĄD: odpowiedź przyszła, ale nie wywołała callback. Najczęściej widzisz HTML/logowanie Google zamiast JavaScript.';delete window[cb];s.remove();}},250);s.src=url;document.head.appendChild(s);};</script></body></html>
